[Config MpOrbDefault]
extends = General
description = "MPORB/ORBCC, default scheduler."
**.schedulerMode = "default"
**.tcp.typename = "MpOrb"
**.tcp.tcpAlgorithmClass = "MpOrbFlavour"
# ORBCC needs IntQueue on the forward bottlenecks to append INT queue telemetry.
# Keep these before the broad DropTail fallback so the specific queues are created as IntQueue.
**.router1a.ppp[1].queue.typename = "IntQueue"
**.router1b.ppp[1].queue.typename = "IntQueue"
**.ppp[*].queue.typename = "DropTailQueue"
**.ppp[*].queue.packetCapacity = 864
**.ppp[*].queue.dropperClass = "inet::queueing::PacketAtCollectionEndDropper"
**.additiveIncreasePercent = 0.05
**.eta = 0.95
**.alpha = 0.01
**.fixedAvgRTTVal = 0

