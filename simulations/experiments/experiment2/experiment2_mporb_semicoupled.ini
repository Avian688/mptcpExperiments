[General]
ned-path = ../..:../../../src:../../../../mptcp/simulations:../../../../mptcp/src:../../../../mporb/simulations:../../../../mporb/src:../../../../orbtcp/simulations:../../../../orbtcp/src:../../../../cubic/simulations:../../../../cubic/src:../../../../tcpPaced/simulations:../../../../tcpPaced/src:../../../../tcpGoodputApplications/simulations:../../../../tcpGoodputApplications/src:../../../../inet4.5/examples:../../../../inet4.5/showcases:../../../../inet4.5/src:../../../../inet4.5/tests/validation:../../../../inet4.5/tests/networks:../../../../inet4.5/tutorials

network = mptcpexperiments.simulations.experiments.experiment2.sharedleopaths
sim-time-limit = 40s
record-eventlog = false
cmdenv-express-mode = true
cmdenv-event-banners = false
cmdenv-redirect-output = false
cmdenv-output-file = experiment2Log.txt
cmdenv-log-prefix = %t | %m |
**.cmdenv-log-level = off

# A uses paths 1-4; B uses 1,2,5,6; C uses 3,4,7,8.
# All three connections have four subflows.
# All eight paths are 60 ms / 100 Mbps with one-BDP (518 packet) queues.
# Run configs start all three users uniformly in the first 5 seconds.
**.numberOfClientServers = 3
**.numberOfSubflows = 4
**.startAllSubflowsAtBeginning = true
**.subflowStartTimes = ""
*.configurator.config = xml("<config><interface hosts='**' address='10.x.x.x' netmask='255.x.x.x'/><autoroute metric='delay'/></config>")
*.configurator.addDefaultRoutes = false
*.configurator.addSubnetRoutes = false
*.configurator.optimizeRoutes = false

**.client[*].numApps = 1
**.client[*].app[0].typename = "MpTcpSessionApp"
*.client[0].app[0].connectAddress = "server[0]"
*.client[1].app[0].connectAddress = "server[1]"
*.client[2].app[0].connectAddress = "server[2]"
*.client[0].tcp.subflowRemoteAddresses = "server[0]>router2[0] server[0]>router2[1] server[0]>router2[2] server[0]>router2[3]"
*.client[1].tcp.subflowRemoteAddresses = "server[1]>router2[0] server[1]>router2[1] server[1]>router2[4] server[1]>router2[5]"
*.client[2].tcp.subflowRemoteAddresses = "server[2]>router2[2] server[2]>router2[3] server[2]>router2[6] server[2]>router2[7]"
**.client[*].app[0].tOpen = 0.1s
**.client[*].app[0].tSend = 0.1s
**.client[*].app[0].tClose = -1s
**.client[*].app[0].sendBytes = 2GB
**.client[*].app[0].dataTransferMode = "bytecount"
**.client[*].app[0].statistic-recording = true

**.server[*].numApps = 1
**.server[*].app[0].typename = "MpTcpSinkApp"
**.server[*].app[0].serverThreadModuleType = "tcpgoodputapplications.applications.tcpapp.TcpGoodputSinkAppThread"

**.tcp.advertisedWindow = 200000000
**.tcp.windowScalingSupport = true
**.tcp.windowScalingFactor = -1
**.tcp.increasedIWEnabled = true
**.tcp.delayedAcksEnabled = false
**.tcp.timestampSupport = true
**.tcp.ecnWillingness = false
**.tcp.nagleEnabled = true
**.tcp.stopOperationTimeout = 4000s
**.tcp.mss = 1448
**.tcp.sackSupport = true
# Enter congestion avoidance at one half-path BDP (259 MSS).
**.tcp.initialSsthresh = 375032
**.tcp.sendQueueLimit = 4MiB
**.schedulerMode = "default"

**.goodputInterval = 0.5s
**.throughputInterval = 0.5s
**.**.goodput:vector(removeRepeats).vector-recording = true
**.**.goodput.result-recording-modes = vector(removeRepeats)
**.**.tcp.conn-*.throughput:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.cwnd:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.cwndLimited:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.rtt:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.srtt:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.paceRate:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.mbytesInFlight:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.ssthresh:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.lossRecovery:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.liaAlpha:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.oliaEpsilon:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.baliaAi:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.baliaMd:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.retransmissionRate:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.txRate:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.U:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.u:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.additiveIncrease:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.sharingFlows:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.bottleneckBandwidth:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.queueingDelay:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledConnectionRate:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledDeliveryRate:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledConnectionCount:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledFairRate:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledRelativeOpportunity:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledUtilizationSafety:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledPathWeight:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledAiRateBudget:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledAdjustedAi:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledDeltaBaseAiRate:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledDeltaAlphaAiRate:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledDeltaTargetShare:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledDeltaRateShare:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledDeltaResponsiveness:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledDeltaAiShare:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledMarginalValue:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledPathPrice:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.semiCoupledWindowDelta:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.metaReinjectedBytes:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.metaReinjections:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.**.result-recording-modes = vector(removeRepeats)
**.**.queue.queueLength:vector(removeRepeats).vector-recording = true
**.**.queue.queueLength.result-recording-modes = vector(removeRepeats)
**.ppp[*].queue.packetCapacity = 518
**.scalar-recording = false
**.vector-recording = false
**.bin-recording = false

**.tcp.typename = "MpOrb"
**.tcp.tcpAlgorithmClass = "MpOrbSemiCoupled"
# ORBCC requires INT telemetry on every forward bottleneck.
# Keep these before the broad DropTail fallback: earlier matching lines have priority in these ini files.
**.router1[0].ppp[2].queue.typename = "IntQueue"
**.router1[1].ppp[2].queue.typename = "IntQueue"
**.router1[2].ppp[2].queue.typename = "IntQueue"
**.router1[3].ppp[2].queue.typename = "IntQueue"
**.router1[4].ppp[1].queue.typename = "IntQueue"
**.router1[5].ppp[1].queue.typename = "IntQueue"
**.router1[6].ppp[1].queue.typename = "IntQueue"
**.router1[7].ppp[1].queue.typename = "IntQueue"
**.ppp[*].queue.typename = "DropTailQueue"
**.ppp[*].queue.dropperClass = "inet::queueing::PacketAtCollectionEndDropper"
**.additiveIncreasePercent = 0.05
**.eta = 0.95
# Zero selects OrbCC's time-normalized alpha = tau / averageRTT.
**.alpha = 0
**.fixedAvgRTTVal = 0

[Config MpOrbSemiCoupled_Run1]
extends = General
description = "MPORB semi-coupled INT connection-opportunity weighting; equal path RTT/capacity, four subflows per connection, run 1."
seed-set = 1
*.client[0].app[0].tOpen = 3.194382s
*.client[0].app[0].tSend = 3.194382s
*.client[1].app[0].tOpen = 1.561383s
*.client[1].app[0].tSend = 1.561383s
*.client[2].app[0].tOpen = 1.402928s
*.client[2].app[0].tSend = 1.402928s
output-vector-file = "results/MpOrbSemiCoupled_Run1-#0.vec"
output-scalar-file = "results/MpOrbSemiCoupled_Run1-#0.sca"

