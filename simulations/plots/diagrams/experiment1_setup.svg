<text x="690" y="773" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="850" fill="#dc2626" text-anchor="middle">Failure signal</text>
<text x="690" y="797" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="650" fill="#0f172a" text-anchor="middle">High subflow throughput</text>
<text x="690" y="818" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="650" fill="#0f172a" text-anchor="middle">but lower app goodput / receiver HoL</text>
