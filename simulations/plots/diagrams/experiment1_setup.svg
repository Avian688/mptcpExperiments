<text x="415.0" y="587" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#475569" text-anchor="middle">path 1</text>
<rect x="810" y="525" width="130" height="84" rx="18" fill="#ffedd5" stroke="#f97316" stroke-width="2.2" filter="url(#shadow)"/>
<text x="875.0" y="559" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">R2b</text>
<text x="875.0" y="587" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#475569" text-anchor="middle">path 1</text>
<line x1="240" y1="392" x2="350" y2="257" stroke="#2563eb" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
<line x1="480" y1="257" x2="810" y2="257" stroke="#2563eb" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
<line x1="940" y1="257" x2="1160" y2="392" stroke="#2563eb" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
<rect x="540" y="135" width="290" height="98" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="558" y="167" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">Path 0 fixed</text>
<text x="558" y="191" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">RTT 20 ms | 10 Mbps</text>
