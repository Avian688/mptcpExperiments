<line x1="480" y1="567" x2="810" y2="567" stroke="#f97316" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
<line x1="940" y1="567" x2="1160" y2="420" stroke="#f97316" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
<rect x="540" y="625" width="330" height="98" rx="14" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
<text x="558" y="657" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">Path 1 swept</text>
<text x="558" y="681" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">RTT 20-180 ms | 100 Mbps</text>
<text x="558" y="705" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">Q = 1554 packets</text>
<rect x="622" y="558" width="64" height="22" rx="6" fill="#ffffff" stroke="#f97316" stroke-width="1.5"/>
<text x="654" y="574" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="850" fill="#f97316" text-anchor="middle">Q</text>
<text x="302" y="533" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="750" fill="#f97316" text-anchor="middle">5-45 ms access</text>
<text x="1030" y="533" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="750" fill="#f97316" text-anchor="middle">5-45 ms access</text>
<rect x="70" y="675" width="390" height="136" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="88" y="707" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">Sweep configs</text>
<text x="88" y="731" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">RTT: 20, 40, ..., 180 ms</text>
<text x="88" y="755" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">Protocols: CUBIC, MPORB</text>
<text x="88" y="779" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">Schedulers: default, lowestRTT, directPull</text>
<rect x="910" y="675" width="390" height="136" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="928" y="707" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">Recorded outputs</text>
<text x="928" y="731" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">aggregate goodput</text>
<text x="928" y="755" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">per-subflow goodput</text>
<text x="928" y="779" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">HoL blocked bytes</text>
<text x="928" y="803" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="650" fill="#0f172a" text-anchor="start">DSN gap at receiver</text>
