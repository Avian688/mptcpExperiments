<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1400" height="860" fill="#f8fafc"/>
<text x="70" y="58" font-family="Inter, Helvetica, Arial, sans-serif" font-size="34" font-weight="850" fill="#0f172a" text-anchor="start">Experiment 1: Scheduler Negatives on Two LEO-Like Paths</text>
<text x="70" y="94" font-family="Inter, Helvetica, Arial, sans-serif" font-size="19" font-weight="500" fill="#475569" text-anchor="start">One MPTCP/MPORB connection, two subflows. Path 0 is fixed and narrow; Path 1 is high-capacity with swept RTT.</text>
<text x="70" y="120" font-family="Inter, Helvetica, Arial, sans-serif" font-size="19" font-weight="500" fill="#475569" text-anchor="start">Goal: expose scheduler-induced reordering / HoL blocking when subflows have very different delay-capacity profiles.</text>
<rect x="90" y="360" width="150" height="92" rx="18" fill="#ffffff" stroke="#0f172a" stroke-width="2.2" filter="url(#shadow)"/>
<text x="165.0" y="394" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">Client[0]</text>
<text x="165.0" y="422" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#475569" text-anchor="middle">1 app</text>
<rect x="1160" y="360" width="150" height="92" rx="18" fill="#ffffff" stroke="#0f172a" stroke-width="2.2" filter="url(#shadow)"/>
<text x="1235.0" y="394" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">Server[0]</text>
<text x="1235.0" y="422" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#475569" text-anchor="middle">sink</text>
<rect x="350" y="215" width="130" height="84" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2.2" filter="url(#shadow)"/>
<text x="415.0" y="249" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">R1a</text>
<text x="415.0" y="277" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#475569" text-anchor="middle">path 0</text>
<rect x="810" y="215" width="130" height="84" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2.2" filter="url(#shadow)"/>
<text x="875.0" y="249" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">R2a</text>
<text x="875.0" y="277" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#475569" text-anchor="middle">path 0</text>
<rect x="350" y="525" width="130" height="84" rx="18" fill="#ffedd5" stroke="#f97316" stroke-width="2.2" filter="url(#shadow)"/>
